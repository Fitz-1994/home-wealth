version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hw-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: home_wealth
      MYSQL_USER: ${MYSQL_USER:-hwuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hwpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - hw-network
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: hw-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: home_wealth
      MYSQL_USER: ${MYSQL_USER:-hwuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hwpassword}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-key-in-production-min-32chars}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hw-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build: ./frontend
    container_name: hw-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hw-network
    restart: unless-stopped

networks:
  hw-network:
    driver: bridge

volumes:
  mysql_data:
