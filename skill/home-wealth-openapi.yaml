openapi: 3.0.3
info:
  title: Home Wealth API
  description: |
    家庭资产管理系统 API。
    提供资产账户管理、投资持仓查询、实时行情、资产大盘数据等能力。
    所有接口均需通过 X-API-Key 认证。
  version: 1.0.0

servers:
  - url: http://localhost/api
    description: 本地部署（替换为实际地址）

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 在系统「设置」页面生成的 API Key，格式为 hw_sk_xxx

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          description: 实际响应数据，类型因接口而异
        timestamp:
          type: integer
          format: int64

    DashboardOverview:
      type: object
      properties:
        totalAssetCny:
          type: number
          description: 总资产（人民币）
        totalLiabilityCny:
          type: number
          description: 总负债（人民币）
        netAssetCny:
          type: number
          description: 净资产（人民币）
        categories:
          type: object
          description: 各资产类型金额（人民币）
          properties:
            LIQUID:
              type: number
              description: 流动资金
            FIXED:
              type: number
              description: 固定资产
            RECEIVABLE:
              type: number
              description: 应收款
            INVESTMENT:
              type: number
              description: 投资理财市值
            LIABILITY:
              type: number
              description: 负债
        investmentMarketValue:
          type: number
          description: 投资总市值（人民币）
        lastUpdated:
          type: string
          format: date-time

    HoldingWithPrice:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
          description: 标的代码（Yahoo Finance格式）
          example: "600519.SS"
        symbolName:
          type: string
          description: 标的名称
          example: "贵州茅台"
        market:
          type: string
          enum: [CN_A, HK, US, HK_OPT, US_OPT, FX]
          description: "市场类型: CN_A=A股, HK=港股, US=美股, HK_OPT=港股期权, US_OPT=美股期权, FX=外汇"
        quantity:
          type: number
          description: 持仓数量
        currentPrice:
          type: number
          description: 当前价格（原始币种）
        priceCurrency:
          type: string
          description: 价格币种
          example: "CNY"
        marketValueCny:
          type: number
          description: 市值（人民币）
        costPrice:
          type: number
          description: 成本价（可选）
        unrealizedPnl:
          type: number
          description: 浮动盈亏（人民币）
        unrealizedPnlPct:
          type: number
          description: 浮动盈亏百分比
        priceChangePct:
          type: number
          description: 今日涨跌幅%
        isStale:
          type: boolean
          description: 行情数据是否过期

    ChartData:
      type: object
      properties:
        dates:
          type: array
          items:
            type: string
          description: 日期列表（YYYY-MM-DD）
        values:
          type: array
          items:
            type: number
          description: 对应金额（人民币）

    HoldingRank:
      type: object
      properties:
        totalValueCny:
          type: number
          description: 投资总市值（人民币）
        items:
          type: array
          items:
            type: object
            properties:
              holdingId:
                type: integer
              symbol:
                type: string
              symbolName:
                type: string
              market:
                type: string
              quantity:
                type: number
              currentPrice:
                type: number
              priceCurrency:
                type: string
              marketValueCny:
                type: number
              ratio:
                type: number
                description: 占投资总仓位比例（0~1）
              priceChangePct:
                type: number

paths:
  # ===== 资产大盘 =====

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      summary: 获取资产总览
      description: |
        返回当前用户的资产总览数据，包括总资产、总负债、净资产、
        各类资产（流动资金/固定资产/应收款/投资理财/负债）的人民币金额汇总。
        适合用于回答"我现在有多少资产"、"净资产是多少"等问题。
      tags: [大盘]
      responses:
        "200":
          description: 资产总览
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DashboardOverview"
              example:
                code: 200
                message: success
                data:
                  totalAssetCny: 1500000.00
                  totalLiabilityCny: 300000.00
                  netAssetCny: 1200000.00
                  categories:
                    LIQUID: 200000.00
                    FIXED: 800000.00
                    RECEIVABLE: 50000.00
                    INVESTMENT: 450000.00
                    LIABILITY: 300000.00
                  investmentMarketValue: 450000.00
                  lastUpdated: "2026-03-07T16:30:00"

  /dashboard/net-asset/history:
    get:
      operationId: getNetAssetHistory
      summary: 获取净资产历史趋势
      description: |
        返回指定天数内每日净资产快照数据，用于绘制折线图或分析资产增长趋势。
        适合回答"最近3个月净资产变化如何"、"今年净资产增长了多少"等问题。
      tags: [大盘]
      parameters:
        - name: days
          in: query
          description: 查询天数（0=全部历史）
          schema:
            type: integer
            default: 90
            enum: [30, 90, 180, 365, 0]
      responses:
        "200":
          description: 净资产历史数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ChartData"

  /dashboard/investment/history:
    get:
      operationId: getInvestmentHistory
      summary: 获取投资资产历史趋势
      description: |
        返回指定天数内每日投资资产总市值快照数据。
        适合回答"我的投资账户最近表现如何"、"投资市值变化趋势"等问题。
      tags: [大盘]
      parameters:
        - name: days
          in: query
          description: 查询天数（0=全部历史）
          schema:
            type: integer
            default: 90
      responses:
        "200":
          description: 投资资产历史数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ChartData"

  /dashboard/holding-rank:
    get:
      operationId: getHoldingRank
      summary: 获取持仓占比排行榜
      description: |
        返回所有投资持仓按市值从高到低排序，包含各持仓市值和占总投资仓位比例。
        适合回答"我持仓最多的股票是什么"、"持仓分布情况"、"哪个股票占比最大"等问题。
      tags: [大盘]
      parameters:
        - name: top
          in: query
          description: 返回前 N 名
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 持仓排行
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HoldingRank"

  /dashboard/sankey:
    get:
      operationId: getDashboardSankey
      summary: 获取资产桑基图数据
      description: 返回用于渲染资产全景桑基图的节点和连接数据（总资产→资产大类→各账户）。
      tags: [大盘]
      responses:
        "200":
          description: 桑基图数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  # ===== 投资持仓 =====

  /holdings:
    get:
      operationId: listHoldings
      summary: 获取所有投资持仓
      description: |
        返回当前用户所有活跃投资持仓，包含实时价格、市值、浮动盈亏等信息。
        适合回答"我现在持有哪些股票"、"我的股票涨跌情况"等问题。
      tags: [投资持仓]
      parameters:
        - name: accountId
          in: query
          description: 筛选指定账户
          schema:
            type: integer
        - name: market
          in: query
          description: 筛选市场类型
          schema:
            type: string
            enum: [CN_A, HK, US, HK_OPT, US_OPT, FX]
      responses:
        "200":
          description: 持仓列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/HoldingWithPrice"

    post:
      operationId: createHolding
      summary: 添加投资持仓
      description: 向投资账户添加新的持仓标的，系统会立即拉取行情计算市值。
      tags: [投资持仓]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountId, symbol, market, quantity, priceCurrency]
              properties:
                accountId:
                  type: integer
                  description: 所属投资账户 ID
                symbol:
                  type: string
                  description: 标的代码（Yahoo Finance格式）
                  example: "600519.SS"
                market:
                  type: string
                  enum: [CN_A, HK, US, HK_OPT, US_OPT, FX]
                quantity:
                  type: number
                  description: 持仓数量
                costPrice:
                  type: number
                  description: 成本价（可选）
                costCurrency:
                  type: string
                  description: 成本价币种
                priceCurrency:
                  type: string
                  description: 行情价格币种
                lotSize:
                  type: integer
                  default: 1
                  description: 每手股数/合约乘数
      responses:
        "200":
          description: 新增持仓（含实时行情）

  /holdings/{id}:
    put:
      operationId: updateHolding
      summary: 修改持仓数量或成本价
      tags: [投资持仓]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: number
                costPrice:
                  type: number
                costCurrency:
                  type: string
                note:
                  type: string
      responses:
        "200":
          description: 更新后的持仓

    delete:
      operationId: closeHolding
      summary: 清仓（软删除）
      tags: [投资持仓]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成功清仓

  /holdings/validate-symbol:
    post:
      operationId: validateSymbol
      summary: 验证标的代码并获取当前价格
      description: 输入标的代码，验证其有效性并返回标的名称和当前价格。
      tags: [投资持仓]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol]
              properties:
                symbol:
                  type: string
                  example: "0700.HK"
                priceCurrency:
                  type: string
                  example: "HKD"
      responses:
        "200":
          description: 标的信息和当前价格

  # ===== 资产账户 =====

  /accounts:
    get:
      operationId: listAccounts
      summary: 获取资产账户列表
      description: 返回当前用户所有资产账户，可按类型或资产类别筛选。
      tags: [资产账户]
      parameters:
        - name: type
          in: query
          description: 账户类型筛选
          schema:
            type: string
            enum: [REGULAR, INVESTMENT]
        - name: category
          in: query
          description: 资产类别筛选
          schema:
            type: string
            enum: [LIQUID, FIXED, RECEIVABLE, INVESTMENT, LIABILITY]
      responses:
        "200":
          description: 账户列表

  /accounts/summary:
    get:
      operationId: getAccountsSummary
      summary: 获取各类资产汇总（普通账户）
      description: 按资产类别汇总普通账户当前余额（人民币），不含投资账户市值。
      tags: [资产账户]
      responses:
        "200":
          description: 各类资产汇总（CNY）

  /accounts/{accountId}/records/current:
    get:
      operationId: getCurrentRecord
      summary: 获取账户当前余额
      description: 获取指定普通账户的最新有效余额记录。
      tags: [资产账户]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 当前余额记录

  /accounts/{accountId}/records:
    post:
      operationId: updateAccountRecord
      summary: 更新账户余额
      description: 为普通账户录入新的余额，旧记录自动标记为历史。
      tags: [资产账户]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  description: 金额
                currency:
                  type: string
                  description: 币种（默认使用账户主币种）
                recordDate:
                  type: string
                  format: date
                note:
                  type: string
      responses:
        "200":
          description: 新增余额记录

  # ===== 行情数据 =====

  /market/prices:
    get:
      operationId: getMarketPrices
      summary: 批量查询行情价格（缓存）
      description: 从本地缓存查询多个标的的最新价格，速度快。
      tags: [行情]
      parameters:
        - name: symbols
          in: query
          required: true
          description: 标的代码，逗号分隔
          schema:
            type: string
          example: "600519.SS,0700.HK,AAPL"
      responses:
        "200":
          description: 各标的最新价格

  /market/refresh:
    post:
      operationId: refreshMarketPrices
      summary: 刷新我的持仓行情
      description: 手动触发拉取当前用户所有持仓的最新行情价格并更新缓存。
      tags: [行情]
      responses:
        "200":
          description: 刷新完成

  /market/rates:
    get:
      operationId: getExchangeRates
      summary: 获取所有汇率（对 CNY）
      description: 返回系统当前缓存的各货币对人民币汇率。
      tags: [行情]
      responses:
        "200":
          description: 汇率映射表（key=币种, value=对CNY汇率）
          content:
            application/json:
              example:
                code: 200
                data:
                  USD: 7.25
                  HKD: 0.93
                  EUR: 7.80
                  JPY: 0.048
                  CNY: 1.0

  # ===== 快照 =====

  /snapshots/trigger:
    post:
      operationId: triggerSnapshot
      summary: 手动生成今日资产快照
      description: 立即生成当日净资产和投资资产快照，写入历史数据用于趋势图。
      tags: [快照]
      responses:
        "200":
          description: 快照生成成功

tags:
  - name: 大盘
    description: 资产大盘数据（总览、趋势图、持仓排行）
  - name: 投资持仓
    description: 投资账户持仓管理
  - name: 资产账户
    description: 普通资产账户管理
  - name: 行情
    description: 股票/基金/汇率行情数据
  - name: 快照
    description: 每日资产快照管理
